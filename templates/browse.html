{% extends "base.html" %}
{% block title %}Browse – MediaManager{% endblock %}
{% block content %}

<div class="d-flex align-items-center justify-content-between mb-3">
  <h2 class="mb-0">📡 Browse</h2>
  <button class="btn btn-outline-secondary btn-sm" onclick="refreshAll()">🔄 Cache verversen</button>
</div>

<!-- ══ IPTV BROWSER ════════════════════════════════════════════ -->
<ul class="nav nav-tabs mb-0" id="browse-tabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link active" id="live-tab" data-bs-toggle="tab" data-bs-target="#tab-live"
            type="button" role="tab" onclick="loadLive()">📺 Live</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="movies-tab" data-bs-toggle="tab" data-bs-target="#tab-movies"
            type="button" role="tab" onclick="loadMovies()">🎬 Films</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="series-tab" data-bs-toggle="tab" data-bs-target="#tab-series"
            type="button" role="tab" onclick="loadSeries()">📺 Series</button>
  </li>
</ul>

<div class="tab-content browse-tab-content">
  <!-- ── Live ── -->
  <div class="tab-pane fade show active" id="tab-live" role="tabpanel">
    <div class="browse-toolbar">
      <div class="search-wrap">
        <input id="q-live" class="form-control search-input" placeholder="🔍 Zoek live kanaal... (of '*' voor alles)">
        <button id="btn-live" class="btn btn-secondary" onclick="loadLive()">Zoeken</button>
      </div>
      <small class="text-muted" id="ts-live"></small>
    </div>
    <div id="tbl-live" class="browse-result"></div>
  </div>

  <!-- ── Films ── -->
  <div class="tab-pane fade" id="tab-movies" role="tabpanel">
    <div class="browse-toolbar">
      <div class="search-wrap">
        <input id="q-movies" class="form-control search-input" placeholder="🔍 Zoek film... (of '*' voor alles)">
        <button id="btn-movies" class="btn btn-secondary" onclick="loadMovies()">Zoeken</button>
      </div>
      <small class="text-muted" id="ts-movies"></small>
    </div>
    <div id="tbl-movies" class="browse-result"></div>
  </div>

  <!-- ── Series ── -->
  <div class="tab-pane fade" id="tab-series" role="tabpanel">
    <div class="browse-toolbar">
      <div class="search-wrap">
        <input id="q-series" class="form-control search-input" placeholder="🔍 Zoek serie... (of '*' voor alles)">
        <button id="btn-series" class="btn btn-secondary" onclick="loadSeries()">Zoeken</button>
      </div>
      <small class="text-muted" id="ts-series"></small>
    </div>
    <div id="tbl-series" class="browse-result"></div>
  </div>
</div>

<!-- ── Serie detail modal ── -->
<div class="modal fade" id="seriesModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content bg-dark border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="seriesModalTitle">Serie</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="seriesModalBody">Laden...</div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Sluiten</button>
        <button type="button" class="btn btn-primary" id="btnDlSeries">📥 Maak alle .strm bestanden</button>
      </div>
    </div>
  </div>
</div>

<!-- ── TMDB detail modal ── -->
<div class="modal fade" id="tmdbMatchModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content bg-dark border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="tmdbMatchTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="tmdbMatchBody">Laden...</div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Sluiten</button>
      </div>
    </div>
  </div>
</div>

{% endblock %}
{% block scripts %}
<script>
const DEBOUNCE = 350;
let _activeSeriesId = null;

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function fmtDate(iso) {
  try { return new Date(iso).toLocaleString("nl-NL"); } catch { return ""; }
}
function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a), ms); };
}
function shouldFetch(q) {
  const s = (q||"").trim().toLowerCase();
  return s==="*" || s==="all" || s.length>=2;
}
function renderHint(id, msg) {
  document.getElementById(id).innerHTML = `<div class="browse-hint">${esc(msg)}</div>`;
}
function renderErr(id, msg) {
  document.getElementById(id).innerHTML = `<div class="alert alert-danger">Fout: ${esc(msg)}</div>`;
}
function renderLoading(id) {
  document.getElementById(id).innerHTML =
    `<div class="browse-hint"><span class="spinner-border spinner-border-sm me-2"></span>Laden...</div>`;
}
function renderTable(containerId, items, cols, actionsFn) {
  if (!items || !items.length) {
    document.getElementById(containerId).innerHTML =
      `<div class="browse-hint text-muted">Geen resultaten gevonden.</div>`; return;
  }
  let h = `<div class="table-responsive">
    <table class="table table-dark table-hover table-sm align-middle mb-0">
      <thead><tr>${cols.map(c=>`<th>${c.title}</th>`).join('')}<th></th></tr></thead><tbody>`;
  items.forEach(it => {
    h += `<tr>${cols.map(c=>`<td>${c.render ? c.render(it) : esc(it[c.key]??'')}</td>`).join('')}
      <td class="text-end text-nowrap">${actionsFn(it)}</td></tr>`;
  });
  h += `</tbody></table></div>`;
  document.getElementById(containerId).innerHTML = h;
}

// ── Live ──────────────────────────────────────────────────────
async function loadLive() {
  const q = document.getElementById("q-live")?.value || "";
  if (!shouldFetch(q)) { renderHint("tbl-live","Zoek met ≥2 tekens of '*' om alles te laden."); return; }
  renderLoading("tbl-live");
  try {
    const d = await fetch("/api/live?q="+encodeURIComponent(q)).then(r=>r.json());
    if (!d.ok) { renderErr("tbl-live", d.error); return; }
    document.getElementById("ts-live").textContent = d.cached_at ? "Cache: "+fmtDate(d.cached_at) : "";
    renderTable("tbl-live", d.items, [
      {title:"#",    render: it=>`<span class="text-muted font-mono">${it.stream_id}</span>`},
      {title:"Naam", render: it=>esc(it.name||"")},
      {title:"Groep",render: it=>esc(it.category_name||"")},
    ], it=>`<button class="btn btn-primary btn-sm btn-pill"
        onclick="genLive(${it.stream_id},'${(it.name||'').replace(/'/g,"&#39;")}')">📁 .strm</button>`);
  } catch(e) { renderErr("tbl-live", e.message); }
}
async function genLive(id, title) {
  const d = await fetch("/api/strm/live",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({stream_id:id,title})}).then(r=>r.json());
  d.ok ? showToast(`✅ Live .strm aangemaakt`,"success") : showToast("❌ "+d.error,"error");
}

// ── Films ─────────────────────────────────────────────────────
async function loadMovies() {
  const q = document.getElementById("q-movies")?.value || "";
  if (!shouldFetch(q)) { renderHint("tbl-movies","Zoek met ≥2 tekens of '*' om alles te laden."); return; }
  renderLoading("tbl-movies");
  try {
    const d = await fetch("/api/movies?q="+encodeURIComponent(q)).then(r=>r.json());
    if (!d.ok) { renderErr("tbl-movies", d.error); return; }
    document.getElementById("ts-movies").textContent = d.cached_at ? "Cache: "+fmtDate(d.cached_at) : "";
    renderTable("tbl-movies", d.items, [
      {title:"#",    render: it=>`<span class="text-muted font-mono">${it.stream_id}</span>`},
      {title:"Titel",render: it=>esc(it.name||"")},
      {title:"Ext",  render: it=>`<span class="font-mono text-muted">${it.container_extension||"mp4"}</span>`},
    ], it=>`<button class="btn btn-primary btn-sm btn-pill"
        onclick="genMovie(${it.stream_id},'${(it.name||'').replace(/'/g,"&#39;")}','${it.container_extension||''}')">
        📁 .strm</button>`);
  } catch(e) { renderErr("tbl-movies", e.message); }
}
async function genMovie(id, title, ext) {
  const d = await fetch("/api/strm/movie",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({stream_id:id,title,ext})}).then(r=>r.json());
  d.ok ? showToast(`✅ Film .strm aangemaakt`,"success") : showToast("❌ "+d.error,"error");
}

// ── Series ────────────────────────────────────────────────────
async function loadSeries() {
  const q = document.getElementById("q-series")?.value || "";
  if (!shouldFetch(q)) { renderHint("tbl-series","Zoek met ≥2 tekens of '*' om alles te laden."); return; }
  renderLoading("tbl-series");
  try {
    const d = await fetch("/api/series?q="+encodeURIComponent(q)).then(r=>r.json());
    if (!d.ok) { renderErr("tbl-series", d.error); return; }
    document.getElementById("ts-series").textContent = d.cached_at ? "Cache: "+fmtDate(d.cached_at) : "";
    renderTable("tbl-series", d.items, [
      {title:"#",    render: it=>`<span class="text-muted font-mono">${it.series_id}</span>`},
      {title:"Titel",render: it=>esc(it.name||"")},
    ], it=>`
      <button class="btn btn-outline-secondary btn-sm btn-pill me-1"
              onclick="openSeriesDetail(${it.series_id},'${(it.name||'').replace(/'/g,"&#39;")}')">🔍 Details</button>
      <button class="btn btn-primary btn-sm btn-pill"
              onclick="genSeries(${it.series_id})">📁 Alle .strm</button>`);
  } catch(e) { renderErr("tbl-series", e.message); }
}
async function openSeriesDetail(id, name) {
  _activeSeriesId = id;
  const titleEl = document.getElementById("seriesModalTitle");
  const bodyEl  = document.getElementById("seriesModalBody");
  if (titleEl) titleEl.textContent = name;
  if (bodyEl)  bodyEl.innerHTML = '<div class="text-center py-4"><span class="spinner-border text-warning"></span></div>';
  new bootstrap.Modal(document.getElementById("seriesModal")).show();
  const d = await fetch("/api/series/"+id).then(r=>r.json());
  if (!d.ok) { bodyEl.innerHTML=`<div class="alert alert-danger">${d.error}</div>`; return; }
  const info=d.data||{}; let html="";
  if (info.info?.cover_big||info.info?.cover) {
    html+=`<div class="text-center mb-3">
      <img src="${info.info.cover_big||info.info.cover}" class="img-fluid rounded" style="max-height:200px">
    </div>`;
  }
  if (d.cached_at) html+=`<p class="text-muted small">Cache: ${fmtDate(d.cached_at)}</p>`;
  const eps=info.episodes||{};
  Object.keys(eps).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(s=>{
    html+=`<h5 class="text-warning mt-3">Seizoen ${s}</h5>
      <div class="table-responsive">
      <table class="table table-dark table-sm table-striped">
        <thead><tr><th>#</th><th>Titel</th><th>Ext</th></tr></thead><tbody>`;
    (eps[s]||[]).forEach(ep=>{
      html+=`<tr><td class="font-mono text-muted">${ep.episode_num||ep.num||""}</td>
             <td>${esc(ep.title||ep.name||"")}</td>
             <td class="font-mono text-muted">${ep.container_extension||""}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  bodyEl.innerHTML = html || "<em class='text-muted'>Geen afleveringen gevonden.</em>";
  document.getElementById("btnDlSeries").onclick = ()=>genSeries(id);
}
async function genSeries(id) {
  showToast("⏳ Bezig met aanmaken...","info");
  const d = await fetch("/api/strm/series",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({series_id:id})}).then(r=>r.json());
  d.ok ? showToast(`✅ ${d.count} .strm bestanden aangemaakt`,"success")
       : showToast("❌ "+d.error,"error");
}

async function refreshAll() {
  showToast("⏳ Cache verversen...","info");
  const d = await fetch("/api/refresh?scope=all",{method:"POST"}).then(r=>r.json());
  if (d.ok) { showToast("✅ Cache ververst","success"); loadLive(); }
  else showToast("❌ "+d.error,"error");
}

document.addEventListener("DOMContentLoaded", () => {
  const bind=(qid,btnid,fn)=>{
    const inp=document.getElementById(qid);
    const btn=document.getElementById(btnid);
    if(inp){ inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();fn();}});
             inp.addEventListener("input",debounce(fn,DEBOUNCE)); }
    if(btn) btn.addEventListener("click",fn);
  };
  bind("q-live","btn-live",loadLive);
  bind("q-movies","btn-movies",loadMovies);
  bind("q-series","btn-series",loadSeries);
  renderHint("tbl-live","Zoek met ≥2 tekens of '*' om alles te laden.");
  renderHint("tbl-movies","Zoek met ≥2 tekens of '*' om alles te laden.");
  renderHint("tbl-series","Zoek met ≥2 tekens of '*' om alles te laden.");
});
</script>
{% endblock %}
