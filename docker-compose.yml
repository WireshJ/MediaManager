services:
  mediamanager:
    image: ghcr.io/wireshj/mediamanager:latest
    container_name: mediamanager
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Bewaar instellingen en data buiten de container
      - ./data:/app/data
      # Mount voor media opslag (pas het linker pad aan naar jouw situatie)
      - /mnt/media:/mnt/media
    environment:
      - PORT=8080
